<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>MarketPulse</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div id="toast" class="toast"></div>

  <!-- Auth Page -->
  <div id="auth-page" style="display:none; justify-content:center; align-items:center; min-height:100vh; background:#000;">
    <div class="auth-box">
      <h1 class="auth-logo">MarketPulse</h1>
      <p class="auth-sub">Real-time market intelligence</p>
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchTab('login')">Login</button>
        <button class="auth-tab" onclick="switchTab('register')">Register</button>
      </div>
      <div id="login-form">
        <input id="login-email" type="email" placeholder="Email" class="auth-input" />
        <input id="login-password" type="password" placeholder="Password" class="auth-input" />
        <p id="login-error" class="auth-error"></p>
        <button class="auth-btn" onclick="login()">Login</button>
      </div>
      <div id="register-form" style="display:none">
        <input id="reg-email" type="email" placeholder="Email" class="auth-input" />
        <input id="reg-password" type="password" placeholder="Password (min 6 chars)" class="auth-input" />
        <p id="reg-error" class="auth-error"></p>
        <button class="auth-btn" onclick="register()">Create Account</button>
      </div>
    </div>
  </div>

  <!-- Main Page -->
  <div id="main-page" style="display:none">
    <header>

      <!-- Top bar: Logo + Search icon + Profile -->
      <div class="top-bar">
        <div class="logo">MarketPulse</div>
        <div class="top-actions">
          <button class="icon-btn" id="search-toggle" onclick="toggleSearch()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
          </button>
          <div class="profile-wrap">
            <button class="profile-btn" id="profile-btn" onclick="toggleProfile()">
              <span id="profile-initial">U</span>
            </button>
            <div class="profile-dropdown" id="profile-dropdown">
              <div class="profile-header">
                <div class="profile-name">My Account</div>
                <div class="profile-email" id="profile-email-display"></div>
              </div>
              <button class="profile-item" onclick="filterByStock('bookmarks'); closeProfile()">Saved Articles</button>
              <button class="profile-item" onclick="showNewest()">Newest First</button>
              <select class="profile-sort" id="sort-select" onchange="changeSort()">
                <option value="newest">Newest First</option>
                <option value="oldest">Oldest First</option>
              </select>
              <button class="profile-item" onclick="refreshNow(); closeProfile()">Refresh Feed</button>
              <button class="profile-item danger" onclick="logout()">Logout</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Expandable search bar -->
      <div class="search-wrap" id="search-wrap" style="display:none">
        <div class="search-inner">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2.5" style="flex-shrink:0">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input id="stock-search" class="search-bar" type="text"
            placeholder="Search stocks (e.g. AAPL, Google...)"
            oninput="showSuggestions()"
            onkeydown="handleSearch(event)"
            spellcheck="false"
            autocomplete="off" />
          <button class="search-close" onclick="toggleSearch()">✕</button>
        </div>
        <div id="suggestions" class="suggestions"></div>
      </div>

      <!-- Circular stock tabs -->
      <div class="stock-tabs" id="stock-tabs"></div>

      <!-- 3 sentiment buttons full width -->
      <div class="sentiment-filters">
        <button class="sentiment-btn bullish" onclick="filterBySentiment('bullish')">Bullish</button>
        <button class="sentiment-btn bearish" onclick="filterBySentiment('bearish')">Bearish</button>
        <button class="sentiment-btn neutral active" onclick="filterBySentiment('all')">All</button>
      </div>

    </header>

    <main id="news-grid" class="news-grid">
      <div class="loading">Loading market news...</div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
