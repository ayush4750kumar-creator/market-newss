<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Test Pipeline — MarketPulse</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <style>
    .pipeline-header {
      background: #000;
      border-bottom: 1px solid #1a1a1a;
      padding: 12px 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .pipeline-top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .pipeline-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .back-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      background: none;
      border: none;
      color: #1a56db;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      padding: 6px 0;
      touch-action: manipulation;
    }
    .pipeline-title {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 700;
      color: #fff;
    }
    .run-btn {
      background: #1a56db;
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 9px 20px;
      font-size: 13px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: background 0.2s;
      touch-action: manipulation;
    }
    .run-btn:hover { background: #1e40af; }
    .run-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .stats-bar {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      background: #000;
      border-bottom: 1px solid #1a1a1a;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .stats-bar::-webkit-scrollbar { display: none; }
    .stat-pill {
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 50px;
      padding: 6px 14px;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .stat-pill .stat-num { font-size: 14px; font-weight: 700; color: #fff; }
    .stat-pill .stat-lbl { font-size: 11px; color: #555; }
    .stat-pill.bullish .stat-num { color: #00c853; }
    .stat-pill.bearish .stat-num { color: #f44336; }
    .running-bar {
      display: none;
      background: rgba(26,86,219,0.1);
      border-bottom: 1px solid rgba(26,86,219,0.2);
      padding: 8px 16px;
      font-size: 12px;
      color: #1a56db;
      font-weight: 500;
      text-align: center;
    }
    .running-bar.show { display: block; }
    .running-dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #1a56db;
      margin-right: 6px;
      animation: pulse 1s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; } 50% { opacity: 0.3; }
    }
  </style>
</head>
<body>

<div id="toast" class="toast"></div>

<div id="pipeline-page">

  <div class="pipeline-header">
    <div class="pipeline-top-bar">
      <div class="pipeline-left">
        <button class="back-btn" onclick="window.location.href='/'">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
          Back
        </button>
        <div class="pipeline-title">Test Pipeline</div>
      </div>
      <button class="run-btn" id="run-btn" onclick="triggerPipeline()">▶ Run Now</button>
    </div>
    <div class="stock-tabs" id="stock-tabs"></div>
    <div class="sentiment-filters">
      <button class="sentiment-btn bullish" onclick="filterBySentiment('BULLISH')">Bullish</button>
      <button class="sentiment-btn bearish" onclick="filterBySentiment('BEARISH')">Bearish</button>
      <button class="sentiment-btn neutral active" onclick="filterBySentiment('all')">All</button>
    </div>
  </div>

  <div class="running-bar" id="running-bar">
    <span class="running-dot"></span> Pipeline is running — fetching and tagging news...
  </div>

  <div class="stats-bar">
    <div class="stat-pill">
      <span class="stat-num" id="stat-total">—</span>
      <span class="stat-lbl">articles</span>
    </div>
    <div class="stat-pill bullish">
      <span class="stat-num" id="stat-bullish">—</span>
      <span class="stat-lbl">bullish</span>
    </div>
    <div class="stat-pill bearish">
      <span class="stat-num" id="stat-bearish">—</span>
      <span class="stat-lbl">bearish</span>
    </div>
    <div class="stat-pill">
      <span class="stat-num" id="stat-updated">—</span>
      <span class="stat-lbl">last run</span>
    </div>
  </div>

  <main id="news-grid" class="news-grid">
    <div class="loading">Hit ▶ Run Now to fetch news from the test pipeline.</div>
  </main>

</div>

<div class="search-wrap" id="search-wrap" style="display:none; position:fixed; top:0; left:0; right:0; z-index:200; padding:12px 16px; background:#000; border-bottom:1px solid #1a1a1a;">
  <div class="search-inner">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2.5" style="flex-shrink:0">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input id="stock-search" class="search-bar" type="text"
      placeholder="Add stock (e.g. AAPL, TSLA...)"
      oninput="showSuggestions()"
      onkeydown="handleSearchKey(event)"
      spellcheck="false" autocomplete="off" />
    <button class="search-close" onclick="closeSearch()">✕</button>
  </div>
  <div id="suggestions" class="suggestions"></div>
</div>

<script>
  const API_BASE = '';
  const token = localStorage.getItem('token');
  if (!token) window.location.href = '/';

  let currentSentiment = 'all';
  let currentTicker = 'all';
  let allArticles = [];
  let trackedTickers = ['TSLA','CAT','UBER','LLY','AAPL','MSFT','NVDA','RELIANCE','TCS','INFY'];

  const STOCK_SUGGESTIONS = [
    { symbol: 'AAPL', name: 'Apple' },
    { symbol: 'TSLA', name: 'Tesla' },
    { symbol: 'GOOGL', name: 'Google' },
    { symbol: 'MSFT', name: 'Microsoft' },
    { symbol: 'AMZN', name: 'Amazon' },
    { symbol: 'META', name: 'Meta' },
    { symbol: 'NVDA', name: 'Nvidia' },
    { symbol: 'NFLX', name: 'Netflix' },
    { symbol: 'UBER', name: 'Uber' },
    { symbol: 'LLY', name: 'Eli Lilly' },
    { symbol: 'CAT', name: 'Caterpillar' },
    { symbol: 'RCAT', name: 'Red Cat Holdings' },
    { symbol: 'TCS', name: 'TCS' },
    { symbol: 'RELIANCE', name: 'Reliance' },
    { symbol: 'INFY', name: 'Infosys' },
    { symbol: 'HDFCBANK', name: 'HDFC Bank' },
    { symbol: 'SBIN', name: 'SBI' },
    { symbol: 'IRFC', name: 'IRFC' },
    { symbol: 'RVNL', name: 'RVNL' },
  ];

  function authHeaders() {
    return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` };
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  function timeAgo(dateStr) {
    if (!dateStr) return '';
    const diff = (Date.now() - new Date(dateStr)) / 1000;
    if (diff < 60) return 'just now';
    if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
    if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
    return `${Math.floor(diff / 86400)}d ago`;
  }

  async function fetchStatus() {
    try {
      const res = await fetch(`/api/pipeline2/status`, { headers: authHeaders() });
      if (!res.ok) return;
      const data = await res.json();

      const runningBar = document.getElementById('running-bar');
      const runBtn = document.getElementById('run-btn');
      if (data.isRunning) {
        runningBar.classList.add('show');
        runBtn.disabled = true;
        runBtn.textContent = 'Running...';
      } else {
        runningBar.classList.remove('show');
        runBtn.disabled = false;
        runBtn.textContent = '▶ Run Now';
      }

      document.getElementById('stat-total').textContent   = data.totalArticles ?? '—';
      document.getElementById('stat-bullish').textContent = data.bullishCount ?? '—';
      document.getElementById('stat-bearish').textContent = data.bearishCount ?? '—';
      document.getElementById('stat-updated').textContent = timeAgo(data.lastUpdated) || '—';

      if (data.articles && data.articles.length > 0) {
        allArticles = data.articles;
        renderNews();
      }
    } catch (e) {
      console.error('Status fetch failed:', e.message);
    }
  }

  function renderNews() {
    const grid = document.getElementById('news-grid');
    let news = allArticles;

    if (currentTicker !== 'all') {
      news = news.filter(a => a.ticker === currentTicker);
    }
    if (currentSentiment !== 'all') {
      news = news.filter(a => a.sentiment === currentSentiment);
    }

    if (news.length === 0) {
      grid.innerHTML = '<div class="loading">No articles yet — hit ▶ Run Now to fetch news.</div>';
      return;
    }

    grid.innerHTML = news.map(item => {
      const sentiment = (item.sentiment || 'neutral').toLowerCase();
      const sentimentLabel = sentiment === 'bullish' ? 'Bullish' : sentiment === 'bearish' ? 'Bearish' : 'Neutral';
      return `
      <div class="news-card ${sentiment}">
        <div class="card-body">
          <div class="card-meta">
            <span class="stock-badge">${item.ticker || 'GLOBAL'}</span>
            <span class="time-label">${timeAgo(item.published_at)}</span>
            <span class="time-label" style="color:#555;font-size:9px">${item.confidence ?? 0}% conf</span>
          </div>
          <div class="card-headline"
            onclick="${item.source_url ? `window.open('${item.source_url}','_blank')` : ''}"
            style="${item.source_url ? 'cursor:pointer' : ''}"
          >${item.headline || ''}</div>
          <div class="card-story">${item.summary || 'Real-time signal from test pipeline.'}</div>
          <div class="sentiment-tag ${sentiment}">${sentimentLabel}</div>
          <div class="card-source">${item.source || 'MarketPulse Test Pipeline'}${item.source_url ? ` · <a href="${item.source_url}" target="_blank" style="color:#1a56db;text-decoration:none">Read →</a>` : ''}</div>
        </div>
      </div>`;
    }).join('');
  }

  function renderStockTabs() {
    const container = document.getElementById('stock-tabs');
    const tickerTabs = trackedTickers.map(t => `
      <button class="tab ${currentTicker === t ? 'active' : ''}" onclick="filterByTicker('${t}')">${t}</button>
    `).join('');

    container.innerHTML = `
      <button class="tab ${currentTicker === 'all' ? 'active' : ''}" onclick="filterByTicker('all')">All</button>
      ${tickerTabs}
      <button class="tab-add" onclick="openAddStock()">+ Add</button>
    `;
  }

  function filterByTicker(ticker) {
    currentTicker = ticker;
    renderStockTabs();
    renderNews();
  }

  function filterBySentiment(sentiment) {
    currentSentiment = currentSentiment === sentiment ? 'all' : sentiment;
    document.querySelectorAll('.sentiment-btn').forEach(b => b.classList.remove('active'));
    if (currentSentiment === 'all') {
      document.querySelector('.sentiment-btn.neutral').classList.add('active');
    } else {
      document.querySelector(`.sentiment-btn.${sentiment.toLowerCase()}`)?.classList.add('active');
    }
    renderNews();
  }

  function openAddStock() {
    document.getElementById('search-wrap').style.display = 'block';
    setTimeout(() => document.getElementById('stock-search').focus(), 100);
  }

  function closeSearch() {
    document.getElementById('search-wrap').style.display = 'none';
    document.getElementById('stock-search').value = '';
    document.getElementById('suggestions').innerHTML = '';
  }

  function showSuggestions() {
    const val = document.getElementById('stock-search').value.trim().toUpperCase();
    const container = document.getElementById('suggestions');
    if (!val) { container.innerHTML = ''; return; }

    const matches = STOCK_SUGGESTIONS.filter(s =>
      s.symbol.startsWith(val) || s.name.toUpperCase().includes(val)
    ).slice(0, 5);

    const addNew = `<div class="suggestion-item" onclick="addTicker('${val}')">➕ Add "${val}" <span>new</span></div>`;
    const options = matches.map(s =>
      `<div class="suggestion-item" onclick="addTicker('${s.symbol}')">${s.symbol} <span>${s.name}</span></div>`
    ).join('');
    container.innerHTML = addNew + options;
  }

  function handleSearchKey(e) {
    if (e.key === 'Enter') {
      const val = document.getElementById('stock-search').value.trim().toUpperCase();
      if (val) addTicker(val);
    }
  }

  function addTicker(symbol) {
    if (!trackedTickers.includes(symbol)) {
      trackedTickers.push(symbol);
    }
    currentTicker = symbol;
    closeSearch();
    renderStockTabs();
    showToast(`${symbol} added — run pipeline to fetch news`);
  }

  async function triggerPipeline() {
    try {
      document.getElementById('run-btn').disabled = true;
      document.getElementById('run-btn').textContent = 'Running...';
      const res = await fetch(`/api/pipeline2/run`, {
        method: 'POST', headers: authHeaders()
      });
      const data = await res.json();
      showToast(data.message || 'Pipeline triggered ✓');
      document.getElementById('running-bar').classList.add('show');
      setTimeout(fetchStatus, 2000);
    } catch (e) {
      showToast('Could not trigger pipeline');
      document.getElementById('run-btn').disabled = false;
      document.getElementById('run-btn').textContent = '▶ Run Now';
    }
  }

  renderStockTabs();
  fetchStatus();
  setInterval(fetchStatus, 5000);
</script>
</body>
</html>
